### model
model_name_or_path: ""

### method
stage: sft
do_train: true
finetuning_type: full

### SD setting
use_joint_sdft: true
sdft_mode: joint
sdft_kl_weight: 0.1
sdft_distill_temperature: 1.0
sdft_teacher_ce_weight: 1.0
sdft_ema_decay: 0.9              # EMA（only work on ema mode）
sdft_keyword_pattern: "，相关的商品关键词有.*?(?=，请给出)" 

### dataset
dataset: ""
template: ""
cutoff_len: 512
preprocessing_num_workers: 16
overwrite_cache: true

### output
output_dir: ""
save_strategy: epoch
logging_steps: 100
# save_steps: 500
save_total_limit: 20
plot_loss: true

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 10
lr_scheduler_type: cosine
warmup_steps: 500
bf16: true
ddp_timeout: 180000000